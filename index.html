<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survive the Great Depression</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Sepia Vintage Theme */
        body {
            background-color: #f4ebd8;
            color: #2c241b;
            font-family: 'Georgia', serif;
            background-image: radial-gradient(#e8dcc4 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .vintage-border {
            border: 4px double #5a4634;
            box-shadow: 8px 8px 0px rgba(90, 70, 52, 0.2);
        }
        .vintage-panel {
            background-color: #faebd7;
            border: 2px solid #5a4634;
        }
        
        /* Dice Animation */
        .dice {
            width: 70px;
            height: 70px;
            background-color: #fff;
            border-radius: 12px;
            border: 2px solid #2c241b;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1), 3px 3px 0 rgba(0,0,0,0.2);
        }
        .rolling {
            animation: shake 0.4s infinite;
        }
        @keyframes shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            25% { transform: translate(-2px, -2px) rotate(15deg); }
            50% { transform: translate(0px, 2px) rotate(0deg); }
            75% { transform: translate(2px, -2px) rotate(-15deg); }
            100% { transform: translate(2px, 2px) rotate(0deg); }
        }

        /* Custom Scrollbar for logs */
        .log-container::-webkit-scrollbar { width: 6px; }
        .log-container::-webkit-scrollbar-track { background: #e8dcc4; }
        .log-container::-webkit-scrollbar-thumb { background: #5a4634; border-radius: 3px; }
    </style>
</head>
<body class="p-2 md:p-8 flex justify-center items-start min-h-screen">

    <div id="app" class="w-full max-w-5xl bg-[#faebd7] vintage-border p-4 md:p-8 relative">
        <!-- Application dynamically renders here -->
    </div>

    <script>
        // --- GAME DATA & STATE ---
        const months = ["October 1930", "November 1930", "December 1930", "January 1931", "February 1931", "March 1931", "April 1931"];
        
        const initialItems = {
            radio: { name: "📻 Family Radio", value: 20, penalty: { morale: -10 } },
            ring: { name: "💍 Wedding Ring", value: 30, penalty: { morale: -20 } },
            furniture: { name: "🪑 Furniture", value: 15, penalty: { morale: -10 } },
            coat: { name: "🧥 Winter Coat", value: 10, penalty: { health: -15 } },
            tools: { name: "⚒️ Work Tools", value: 15, penalty: { morale: -5 } }
        };

        const initialState = {
            phase: 'start', // 'start', 'roll', 'decision', 'end'
            round: 1,
            money: 250,
            health: 100,
            morale: 100,
            debt: 0,
            housing: 'Apartment',
            evictionRisk: 0,
            inventory: { radio: true, ring: true, furniture: true, coat: true, tools: true },
            logs: [],
            diceResult: null,
            isRolling: false,
            modal: null,
            endReason: null,
            bankFailed: false
        };

        let state = JSON.parse(JSON.stringify(initialState));

        // --- CORE LOGIC ---
        function startGame() {
            state = JSON.parse(JSON.stringify(initialState));
            state.logs.push("You lost your job. The struggle begins.");
            startRound();
        }

        function resetGame() {
            startGame();
        }

        function startRound() {
            if (state.round > 7) {
                endGame();
                return;
            }
            state.phase = 'roll';
            state.diceResult = null;

            let hardshipTriggered = false;

            // Hardship: Bank Failure
            if (state.round === 3 && state.money > 0 && !state.bankFailed) {
                let lost = Math.floor(state.money / 2);
                state.money -= lost;
                state.bankFailed = true;
                alertSpecial("🏛️ Bank Failure!", `The local bank has collapsed. Panic sweeps the streets. You lost $${lost} of your frozen savings!`);
                logMessage(`Bank failed. Lost $${lost}.`);
                hardshipTriggered = true;
            }

            // Hardship: Eviction
            if (state.evictionRisk >= 2 && state.housing !== 'Hooverville') {
                evict();
                if (!hardshipTriggered) {
                    alertSpecial("⚠️ Evicted!", "Your landlord finally kicked you out for missing rent. You have moved your family to a Hooverville shantytown.");
                } else {
                    logMessage("Evicted! You now live in a Hooverville.");
                }
            }

            if (!state.modal) render();
        }

        function logMessage(msg) {
            state.logs.unshift(`${months[state.round - 1] || 'End'}: ${msg}`);
            if (state.logs.length > 10) state.logs.pop();
        }

        function updateMoney(amount) {
            if (amount > 0) {
                if (state.debt > 0) {
                    let pay = Math.min(amount, state.debt);
                    state.debt -= pay;
                    amount -= pay;
                }
                state.money += amount;
            } else {
                state.money += amount; 
                if (state.money < 0) {
                    state.debt += Math.abs(state.money);
                    state.money = 0;
                }
            }
        }

        function checkBounds() {
            if (state.health > 100) state.health = 100;
            if (state.health < 0) state.health = 0;
            if (state.morale > 100) state.morale = 100;
            if (state.morale < 0) state.morale = 0;
        }

        function evict() {
            state.housing = 'Hooverville';
            state.evictionRisk = 0;
            state.morale -= 30;
            state.health -= 20;
            logMessage("EVICTED! Moved to a Hooverville.");
        }

        function sellItem(key) {
            const item = initialItems[key];
            updateMoney(item.value);
            if (item.penalty.morale) state.morale += item.penalty.morale;
            if (item.penalty.health) state.health += item.penalty.health;
            state.inventory[key] = false;
            
            checkBounds();
            logMessage(`Sold ${item.name} for $${item.value}.`);
            
            if (state.health <= 0 || state.morale <= 0) {
                handleDeath();
            } else {
                render();
            }
        }

        function handleDeath() {
            state.phase = 'end';
            state.endReason = state.health <= 0 ? 'health' : 'morale';
            if (state.modal) state.modal = null;
            render();
        }

        function rollDice() {
            state.isRolling = true;
            render();

            setTimeout(() => {
                state.diceResult = Math.floor(Math.random() * 6) + 1;
                state.isRolling = false;
                state.phase = 'decision';
                logMessage(`Rolled a ${state.diceResult}. Event triggered.`);
                render();
            }, 800);
        }

        function makeDecision(index) {
            const ev = getEvents()[state.diceResult];
            const choice = ev.options[index];
            
            choice.action();
            checkBounds();
            logMessage(`Chose: "${choice.label.split('(')[0].trim()}"`);

            if (state.health <= 0 || state.morale <= 0) {
                handleDeath();
                return;
            }

            state.round++;
            startRound();
        }

        function endGame() {
            state.phase = 'end';
            state.endReason = 'survived';
            render();
        }

        // --- EVENT GENERATOR ---
        function getEvents() {
            const isApt = state.housing === 'Apartment';
            const rent = isApt ? 40 : 0;
            const foodUtils = isApt ? 35 : 25; // Rent=$40, Food=$25, Utils=$10. Hooverville = just food.
            const baseExpense = rent + foodUtils;

            return {
                1: {
                    title: "Medical Emergency",
                    desc: `Your youngest child caught a terrible fever. The doctor costs $20. Monthly living expenses are $${baseExpense}.`,
                    options: [
                        { label: `Pay doctor & bills (-$${baseExpense + 20})`, action: () => { updateMoney(-(baseExpense + 20)); } },
                        ...(isApt ? [{ label: `Skip rent, pay doctor (-$${foodUtils + 20})`, action: () => { updateMoney(-(foodUtils + 20)); state.evictionRisk++; state.morale -= 10; logMessage("Skipped rent."); } }] : []),
                        { label: `Use home remedies & pay bills (-$${baseExpense})`, action: () => { updateMoney(-baseExpense); state.health -= 25; state.morale -= 15; logMessage("Child remained sick. Health plummeted."); } }
                    ]
                },
                2: {
                    title: "Temporary Labor",
                    desc: `A local factory is hiring temporary workers for dangerous shifts. It pays $45. Monthly expenses are $${baseExpense}.`,
                    options: [
                        { label: `Take job & pay bills (-$${Math.max(0, baseExpense - 45)})`, action: () => { updateMoney(-(baseExpense - 45)); state.health -= 15; logMessage("Worked hard shift. Lost health."); } },
                        ...(isApt ? [{ label: `Take job, skip rent (+/$-$${Math.abs(45 - foodUtils)})`, action: () => { updateMoney(45 - foodUtils); state.evictionRisk++; state.health -= 15; } }] : []),
                        { label: `Decline job, pay bills (-$${baseExpense})`, action: () => { updateMoney(-baseExpense); } }
                    ]
                },
                3: {
                    title: "The Cold Bites",
                    desc: `Prices drop but food is scarce. A bitter winter storm hits. Extra heating coal costs $15. Expenses: $${baseExpense}.`,
                    options: [
                        { label: `Buy coal & pay bills (-$${baseExpense + 15})`, action: () => { updateMoney(-(baseExpense + 15)); } },
                        { label: `Endure the freezing cold (-$${baseExpense})`, action: () => { updateMoney(-baseExpense); state.health -= 20; state.morale -= 15; logMessage("Suffered through the freezing cold."); } },
                        ...(state.inventory.furniture ? [{ label: `Burn furniture for heat (-$${baseExpense})`, action: () => { updateMoney(-baseExpense); state.inventory.furniture = false; state.morale -= 15; logMessage("Burned furniture to survive the cold."); } }] : [])
                    ]
                },
                4: {
                    title: isApt ? "Landlord Visit" : "Hooverville Hardship",
                    desc: isApt 
                            ? `Your landlord knocks loudly, demanding the $40 rent. Expenses: $${baseExpense}.` 
                            : `Thieves raid your shack while you sleep, stealing food. Expenses: $${baseExpense + 10}.`,
                    options: isApt ? [
                        { label: `Pay in full (-$${baseExpense})`, action: () => { updateMoney(-baseExpense); } },
                        { label: `Beg for an extension (-$${foodUtils})`, action: () => { updateMoney(-foodUtils); if(Math.random()>0.5){ state.evictionRisk++; logMessage("Landlord grumbled but agreed."); } else { state.evictionRisk+=2; logMessage("Landlord furious! Eviction imminent."); } state.morale -= 15; } },
                        { label: `Accept Eviction now (-$${foodUtils})`, action: () => { updateMoney(-foodUtils); evict(); } }
                    ] : [
                        { label: `Buy replacement food (-$${baseExpense + 10})`, action: () => { updateMoney(-(baseExpense + 10)); } },
                        { label: `Go hungry (-$${baseExpense - 25})`, action: () => { updateMoney(-(baseExpense - 25)); state.health -= 20; state.morale -= 20; logMessage("You starved this month."); } }
                    ]
                },
                5: {
                    title: "Soup Kitchen",
                    desc: `A church charity opened a soup kitchen. You can wait 6 hours for free food (saves $25). Expenses: $${baseExpense}.`,
                    options: [
                        { label: `Wait in the breadline (-$${baseExpense - 25})`, action: () => { updateMoney(-(baseExpense - 25)); state.morale -= 15; logMessage("Stood in the freezing breadline."); } },
                        { label: `Too proud. Pay full bills (-$${baseExpense})`, action: () => { updateMoney(-baseExpense); state.morale += 10; } },
                        ...(isApt ? [{ label: `Wait in line AND skip rent (+/$-$${Math.abs(25 - foodUtils)})`, action: () => { updateMoney(25 - foodUtils); state.morale -= 25; state.evictionRisk++; } }] : [])
                    ]
                },
                6: {
                    title: "Neighbor's Offer",
                    desc: state.inventory.tools 
                            ? `A wealthier neighbor offers you $35 for odd jobs because you have tools. Expenses: $${baseExpense}.`
                            : `A neighbor offers you $20 to sweep their driveway. Expenses: $${baseExpense}.`,
                    options: [
                        { label: `Do the job & pay bills (-$${Math.max(0, baseExpense - (state.inventory.tools ? 35 : 20))})`, action: () => { updateMoney(-(baseExpense - (state.inventory.tools ? 35 : 20))); } },
                        ...(isApt ? [{ label: `Do job, skip rent (+/$-$${Math.abs((state.inventory.tools ? 35 : 20) - foodUtils)})`, action: () => { updateMoney((state.inventory.tools ? 35 : 20) - foodUtils); state.evictionRisk++; } }] : []),
                        { label: `Decline, pay bills (-$${baseExpense})`, action: () => { updateMoney(-baseExpense); } }
                    ]
                }
            };
        }

        // --- UI RENDERING ---
        function getDiceHTML(num) {
            if (!num) return `<div class="text-4xl font-bold text-gray-400">?</div>`;
            const dots = {
                1: [4], 2: [0, 8], 3: [0, 4, 8], 
                4: [0, 2, 6, 8], 5: [0, 2, 4, 6, 8], 6: [0, 2, 3, 5, 6, 8]
            };
            let html = '<div class="grid grid-cols-3 grid-rows-3 gap-1 p-2 w-full h-full">';
            for (let i = 0; i < 9; i++) {
                html += dots[num].includes(i) ? '<div class="bg-black rounded-full w-3 h-3 mx-auto my-auto shadow-sm"></div>' : '<div></div>';
            }
            html += '</div>';
            return html;
        }

        function alertSpecial(title, message) {
            state.modal = { title, message };
            render();
        }

        function closeModal() {
            state.modal = null;
            render();
        }

        function renderInventory() {
            const keys = Object.keys(initialItems);
            let html = '';
            let hasItems = false;
            keys.forEach(k => {
                if (state.inventory[k]) {
                    hasItems = true;
                    html += `
                        <li class="flex justify-between items-center bg-[#f4ebd8] p-2 rounded border border-[#5a4634] text-sm">
                            <span class="font-semibold">${initialItems[k].name}</span>
                            <button onclick="sellItem('${k}')" class="text-xs bg-red-800 text-white px-3 py-1 rounded shadow hover:bg-red-700 transition">Sell ($${initialItems[k].value})</button>
                        </li>
                    `;
                }
            });
            return hasItems ? html : `<p class="text-sm italic text-gray-600">You have nothing left to sell.</p>`;
        }

        function renderEventArea() {
            if (state.phase === 'roll') {
                return `
                    <div class="flex flex-col items-center justify-center h-full text-center space-y-8 py-10">
                        <h3 class="text-3xl font-bold font-serif">A New Month Begins</h3>
                        <p class="text-lg italic text-gray-700">Roll the dice to see what hardship or opportunity life brings.</p>
                        <div class="dice ${state.isRolling ? 'rolling' : ''}">${getDiceHTML(state.diceResult)}</div>
                        <button onclick="rollDice()" class="bg-[#5a4634] text-[#f4ebd8] px-8 py-3 rounded shadow-lg hover:bg-[#3d2f23] transition font-bold text-xl uppercase tracking-wider" ${state.isRolling ? 'disabled' : ''}>
                            ${state.isRolling ? 'Rolling...' : 'Roll Dice'}
                        </button>
                    </div>
                `;
            } else if (state.phase === 'decision') {
                const ev = getEvents()[state.diceResult];
                return `
                    <div class="flex flex-col h-full space-y-6">
                        <div class="flex items-center space-x-6 border-b-2 border-[#5a4634] pb-4">
                            <div class="dice transform scale-75 m-0">${getDiceHTML(state.diceResult)}</div>
                            <h3 class="text-3xl font-bold font-serif text-[#8b0000]">${ev.title}</h3>
                        </div>
                        <p class="text-xl leading-relaxed text-gray-800 italic bg-white/40 p-4 rounded border-l-4 border-[#5a4634]">"${ev.desc}"</p>
                        <h4 class="font-bold text-lg mt-4">What will you do?</h4>
                        <div class="space-y-3 mt-auto">
                            ${ev.options.map((opt, i) => `
                                <button onclick="makeDecision(${i})" class="w-full text-left bg-[#f4ebd8] border-2 border-[#5a4634] p-4 rounded shadow hover:bg-[#e8dcc4] transition font-semibold text-lg hover:pl-6 focus:outline-none">
                                    ▶ ${opt.label}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            return '';
        }

        function render() {
            const app = document.getElementById('app');

            if (state.phase === 'start') {
                app.innerHTML = `
                    <div class="text-center space-y-8 max-w-3xl mx-auto py-12">
                        <h1 class="text-5xl md:text-6xl font-bold text-[#5a4634] mb-4 font-serif uppercase tracking-widest border-b-4 border-double border-[#5a4634] inline-block pb-4">Survive the<br>Great Depression</h1>
                        <p class="text-xl italic text-gray-800 font-serif">A historical simulation of life after the 1929 Stock Market Crash.</p>
                        
                        <div class="vintage-panel p-8 rounded text-left space-y-6 shadow-inner mx-4">
                            <h3 class="text-2xl font-bold border-b-2 border-[#5a4634] pb-2 font-serif text-[#8b0000]">Your Situation: October 1930</h3>
                            <p class="text-lg leading-relaxed">You are an ordinary American worker. The economy has collapsed. You just lost your job.</p>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-white/50 p-4 border border-[#5a4634] rounded">
                                <ul class="list-none space-y-2 text-lg">
                                    <li>💵 <strong>Savings:</strong> $250</li>
                                    <li>👨‍👩‍👧 <strong>Dependents:</strong> 3</li>
                                </ul>
                                <ul class="list-none space-y-2 text-lg">
                                    <li>🏠 <strong>Rent:</strong> $40 /mo</li>
                                    <li>🍞 <strong>Food & Utils:</strong> $35 /mo</li>
                                </ul>
                            </div>
                            <p class="font-bold text-red-800 text-center text-lg mt-4 bg-red-100 p-2 rounded">Goal: Survive 7 months without losing your family's health, morale, or home.</p>
                        </div>
                        <button onclick="startGame()" class="bg-[#5a4634] text-[#f4ebd8] px-10 py-4 rounded shadow-lg hover:bg-[#3d2f23] transition font-bold text-2xl uppercase tracking-wider animate-pulse">Begin Simulation</button>
                    </div>
                `;
            } else if (state.phase === 'end') {
                let title = "";
                let desc = "";

                if (state.endReason === 'health') {
                    title = "Family Collapse";
                    desc = "The physical toll of the Great Depression was too much. Illness and starvation overwhelmed your family. A tragic end shared by many during this dark era.";
                } else if (state.endReason === 'morale') {
                    title = "Family Collapse";
                    desc = "The emotional burden, constant stress, and loss of dignity broke your family apart. Hope was lost in the darkest days.";
                } else {
                    if (state.housing === 'Hooverville' || state.debt > 50) {
                        title = "Deep Poverty";
                        desc = "You survived the harshest years, but lost your home and fell into deep debt. You now live in a Hooverville shantytown, hoping FDR's new policies will bring a better tomorrow.";
                    } else if (state.debt === 0 && state.housing === 'Apartment' && state.money > 50) {
                        title = "Recovery";
                        desc = "You barely made it through the worst of the Depression intact! You kept your home, managed your finances, and with new relief programs starting, you finally found steady work.";
                    } else {
                        title = "Survival";
                        desc = "You made difficult sacrifices, skipped meals, and lost precious belongings, but your family is still together. You survived the initial shock of the Great Depression.";
                    }
                }

                app.innerHTML = `
                    <div class="text-center space-y-8 max-w-3xl mx-auto py-10">
                        <h1 class="text-5xl font-bold ${state.endReason === 'survived' ? 'text-[#5a4634]' : 'text-red-800'} mb-4 font-serif uppercase tracking-widest">${title}</h1>
                        <p class="text-2xl leading-relaxed italic border-y-2 border-[#5a4634] py-4 bg-white/30">"${desc}"</p>
                        
                        <div class="vintage-panel p-6 rounded text-left grid grid-cols-2 md:grid-cols-3 gap-6 my-8 text-lg">
                            <p>💵 <strong>Final Money:</strong> $${state.money}</p>
                            <p>📜 <strong>Final Debt:</strong> $${state.debt}</p>
                            <p>🏠 <strong>Housing:</strong> <span class="${state.housing === 'Hooverville' ? 'text-red-700 font-bold' : ''}">${state.housing}</span></p>
                            <p>❤️ <strong>Health:</strong> ${state.health}%</p>
                            <p>🧠 <strong>Morale:</strong> ${state.morale}%</p>
                            <p>⏱️ <strong>Rounds:</strong> ${state.round > 7 ? 7 : state.round}/7</p>
                        </div>
                        
                        <div class="bg-white/50 p-4 rounded text-sm text-left italic mb-6 log-container max-h-40 overflow-y-auto border border-[#5a4634]">
                            <h4 class="font-bold not-italic mb-2 border-b border-[#5a4634]">History Log:</h4>
                            ${state.logs.map(l => `<p class="mb-1">• ${l}</p>`).join('')}
                        </div>

                        <button onclick="resetGame()" class="bg-[#5a4634] text-[#f4ebd8] px-8 py-3 rounded shadow hover:bg-[#3d2f23] transition font-bold text-xl uppercase tracking-wider">Play Again</button>
                    </div>
                `;
            } else {
                app.innerHTML = `
                    <!-- Header -->
                    <div class="flex justify-between items-end border-b-4 border-double border-[#5a4634] pb-4 mb-6">
                        <div>
                            <h1 class="text-3xl font-bold font-serif uppercase text-[#5a4634] hidden md:block">Survive the Great Depression</h1>
                            <h1 class="text-xl font-bold font-serif uppercase text-[#5a4634] md:hidden">The Great Depression</h1>
                        </div>
                        <button onclick="resetGame()" class="text-sm bg-gray-300 px-3 py-1 rounded border border-gray-500 hover:bg-gray-400 font-sans">Restart Game</button>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <!-- Main Left/Center -->
                        <div class="lg:col-span-2 space-y-6 flex flex-col">
                            
                            <!-- Date Banner -->
                            <div class="bg-[#e8dcc4] p-3 rounded border-2 border-[#5a4634] flex justify-between items-center shadow-sm">
                                <h2 class="text-xl font-bold text-[#8b0000] uppercase tracking-wide">Round ${state.round} of 7</h2>
                                <h2 class="text-xl font-bold font-serif">${months[state.round - 1]}</h2>
                            </div>

                            <!-- Event/Action Area -->
                            <div class="vintage-panel p-6 rounded shadow-md flex-grow min-h-[400px]">
                                ${renderEventArea()}
                            </div>

                            <!-- Logs Mini-View -->
                            <div class="bg-[#e8dcc4]/50 p-3 rounded border border-[#5a4634] log-container h-24 overflow-y-auto text-sm italic text-gray-800">
                                ${state.logs.map(l => `<p class="mb-1 border-b border-black/10 pb-1">${l}</p>`).join('')}
                            </div>
                        </div>

                        <!-- Right Sidebar (Dashboard) -->
                        <div class="space-y-6">
                            
                            <!-- Status Panel -->
                            <div class="vintage-panel p-5 rounded shadow-sm">
                                <h3 class="font-bold text-xl border-b-2 border-[#5a4634] pb-2 mb-4 font-serif uppercase tracking-widest text-center">Dashboard</h3>
                                
                                <div class="grid grid-cols-2 gap-4 mb-4 text-lg">
                                    <div class="bg-white/60 p-2 rounded border border-[#5a4634] text-center">
                                        <div class="text-sm uppercase text-gray-600">Money</div>
                                        <div class="font-bold ${state.money === 0 ? 'text-red-600' : 'text-green-700'}">💵 $${state.money}</div>
                                    </div>
                                    <div class="bg-white/60 p-2 rounded border border-[#5a4634] text-center">
                                        <div class="text-sm uppercase text-gray-600">Debt</div>
                                        <div class="font-bold ${state.debt > 0 ? 'text-red-600' : ''}">📜 $${state.debt}</div>
                                    </div>
                                </div>

                                <div class="space-y-3 mb-4 bg-white/60 p-3 rounded border border-[#5a4634]">
                                    <p class="flex justify-between border-b border-dotted border-gray-400 pb-1"><span>🏠 Housing:</span> <strong class="${state.housing === 'Hooverville' ? 'text-red-700' : ''}">${state.housing}</strong></p>
                                    <p class="flex justify-between border-b border-dotted border-gray-400 pb-1"><span>🍞 Food Supply:</span> <strong>${state.housing === 'Hooverville' ? '<span class="text-red-600">Scarce</span>' : '<span class="text-green-700">Adequate</span>'}</strong></p>
                                    <p class="flex justify-between border-b border-dotted border-gray-400 pb-1 text-sm text-gray-600"><span>Monthly Rent:</span> <span>${state.housing === 'Apartment' ? '$40' : '$0'}</span></p>
                                </div>

                                <div class="space-y-4">
                                    <div>
                                        <div class="flex justify-between text-sm font-bold mb-1">
                                            <span>❤️ Health</span>
                                            <span>${state.health}%</span>
                                        </div>
                                        <div class="w-full bg-red-200 h-5 rounded border border-[#5a4634] overflow-hidden">
                                            <div class="bg-red-600 h-full transition-all duration-500 ease-out flex items-center justify-end pr-1 text-xs text-white" style="width: ${state.health}%"></div>
                                        </div>
                                    </div>
                                    <div>
                                        <div class="flex justify-between text-sm font-bold mb-1">
                                            <span>🧠 Morale</span>
                                            <span>${state.morale}%</span>
                                        </div>
                                        <div class="w-full bg-blue-200 h-5 rounded border border-[#5a4634] overflow-hidden">
                                            <div class="bg-blue-600 h-full transition-all duration-500 ease-out flex items-center justify-end pr-1 text-xs text-white" style="width: ${state.morale}%"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Inventory Panel -->
                            <div class="vintage-panel p-5 rounded shadow-sm">
                                <h3 class="font-bold text-lg border-b-2 border-[#5a4634] pb-2 mb-3 font-serif uppercase tracking-widest text-center">Items to Sell</h3>
                                <p class="text-xs text-center italic mb-3 text-gray-600">Selling items helps survive, but harms morale or health.</p>
                                <ul class="space-y-2">
                                    ${renderInventory()}
                                </ul>
                            </div>
                        </div>
                    </div>

                    <!-- Modal Overlay -->
                    ${state.modal ? `
                        <div class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                            <div class="bg-[#f4ebd8] p-8 rounded shadow-2xl vintage-border max-w-md w-full text-center space-y-6">
                                <h2 class="text-3xl font-bold text-[#8b0000] font-serif uppercase">${state.modal.title}</h2>
                                <p class="text-xl leading-relaxed italic border-y border-[#5a4634] py-4">"${state.modal.message}"</p>
                                <button onclick="closeModal()" class="bg-[#5a4634] text-[#f4ebd8] px-8 py-3 rounded shadow hover:bg-[#3d2f23] transition font-bold text-xl uppercase tracking-wider">Continue</button>
                            </div>
                        </div>
                    ` : ''}
                `;
            }
        }

        // Initialize App
        render();

    </script>
</body>
</html>
